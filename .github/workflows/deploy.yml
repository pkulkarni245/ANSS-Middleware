name: Build and Push to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This allows you to trigger the run manually from the UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: anssregistry123.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        docker build -t anssregistry123.azurecr.io/anss-app:latest .
        docker push anssregistry123.azurecr.io/anss-app:latest

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'anss-middleware-svc123'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: 'anssregistry123.azurecr.io/anss-app:latest'
